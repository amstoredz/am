@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
:root{
  --p:#7c3aed;--p2:#a855f7;
  --bg:#f4f4f6;--card:#fff;
  --border:#e5e7eb;--borderl:#d1d5db;
  --text:#111827;--muted:#6b7280;
  --gold:#f59e0b;--goldd:#d97706;
  --green:#059669;--red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#f1f1f1;}
::-webkit-scrollbar-thumb{background:var(--p);border-radius:3px;}

/* HEADER */
header{background:#fff;border-bottom:2px solid #111;padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.hdr{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.logo-box{width:40px;height:40px;background:#111;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;letter-spacing:1px;}
.logo-name{font-size:19px;font-weight:900;color:#111;letter-spacing:.5px;}
.hdr-badge{background:#111;color:#fff;border-radius:100px;padding:5px 14px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;}

/* PAGE */
.page{max-width:720px;margin:0 auto;padding:0 14px 80px;}

/* PRODUCT HERO */
.product-hero{background:#fff;border:2px solid #111;border-radius:16px;overflow:hidden;margin:18px 0 14px;box-shadow:4px 4px 0 #111;}

/* IMAGE SLIDER */
.slider-wrap{position:relative;width:100%;background:#f9f9f9;overflow:hidden;}
.slides{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);}
.slide{min-width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#f3f0ff;font-size:90px;overflow:hidden;flex-shrink:0;}
.slide img{width:100%;height:100%;object-fit:cover;}
.slide-emoji{font-size:90px;}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);background:#111;color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;opacity:.85;transition:opacity .2s;}
.slider-btn:hover{opacity:1;}
.slider-prev{left:10px;}
.slider-next{right:10px;}
.slider-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.6);border:1.5px solid #111;cursor:pointer;transition:all .2s;}
.dot.active{background:#111;width:18px;border-radius:4px;}
.thumb-row{display:flex;gap:8px;padding:10px 12px;background:#fafafa;border-top:1.5px solid var(--border);overflow-x:auto;}
.thumb{width:60px;height:60px;border-radius:8px;border:2px solid var(--border);overflow:hidden;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f3f0ff;font-size:28px;transition:border-color .2s;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb.active{border-color:#111;box-shadow:2px 2px 0 #111;}

/* BADGE */
.badge-top{position:absolute;top:12px;right:12px;background:var(--gold);color:#000;font-size:11px;font-weight:800;padding:4px 12px;border-radius:100px;border:1.5px solid #111;box-shadow:2px 2px 0 #111;}

/* PRODUCT BODY */
.product-body{padding:18px 18px 20px;}
.product-name{font-size:21px;font-weight:900;color:#111;margin-bottom:6px;line-height:1.3;}
.price-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.price-main{font-size:26px;font-weight:900;color:var(--p);}
.price-unit{font-size:13px;color:var(--muted);}
.price-old{font-size:14px;color:var(--muted);text-decoration:line-through;}
.product-desc{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:16px;}

/* FEATURES */
.feats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
.feat{background:#f9fafb;border:1.5px solid #111;border-radius:10px;padding:11px 12px;display:flex;align-items:center;gap:9px;box-shadow:2px 2px 0 #e5e7eb;}
.feat-icon{font-size:20px;flex-shrink:0;}
.feat-txt{font-size:12px;color:var(--muted);line-height:1.4;}
.feat-txt strong{display:block;font-size:13px;color:#111;margin-bottom:1px;font-weight:700;}

/* COLORS */
.sec-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px;font-weight:600;}
.colors-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.cbtn{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:100px;border:2px solid #ddd;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;color:#111;background:#fff;transition:all .2s;font-weight:600;}
.cbtn.active{border-color:#111;background:#111;color:#fff;box-shadow:2px 2px 0 var(--p);}
.cswatch{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);}

/* TRUST */
.trust-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
.trust-item{background:#fff;border:2px solid #111;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:3px 3px 0 #111;}
.trust-icon{font-size:22px;margin-bottom:5px;}
.trust-txt{font-size:11px;color:var(--muted);line-height:1.4;font-weight:500;}

/* ORDER SECTION */
.order-section{background:#fff;border:2px solid #111;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:4px 4px 0 #111;}
.order-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:7px;color:#111;}

/* ORDER SUMMARY */
.order-sum{background:#f9f9f9;border:2px solid #111;border-radius:12px;padding:14px;margin-bottom:16px;}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px;}
.sum-row:not(:last-child){border-bottom:1px solid #e5e7eb;}
.sum-row.total{font-size:16px;font-weight:800;color:var(--p);padding-top:9px;margin-top:3px;}
.sum-label{color:var(--muted);}

/* FORM */
.form-group{margin-bottom:13px;}
.form-label{font-size:13px;color:#111;margin-bottom:7px;display:flex;align-items:center;gap:5px;font-weight:700;}
.form-control{

  border:2px solid #111;border-radius:10px;
  padding:11px 14px;color:#111;
